name: Deploy Docs and Components to GitHub Pages

on:
  # 在推送到 main 分支时触发
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "packages/**"
      - "apps/**/README.md"
      - "apps/**/src/**/*.stories.*"
      - "README.md"

  # 允许手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，跳过正在运行的部署和最新的排队部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 不需要完整历史记录，但需要一些历史以获取最后修改时间

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: |
          cd docs/overview
          NODE_ENV=production pnpm run docs:build

      - name: Build Storybook
        run: |
          cd docs/components
          NODE_ENV=production pnpm run build

      - name: Combine builds
        run: |
          # 创建最终部署目录
          mkdir -p combined-dist

          # 复制 VitePress 文档到根目录
          cp -r docs/overview/.vitepress/dist/* combined-dist/

          # 复制 Storybook 到 components 子目录
          mkdir -p combined-dist/components
          cp -r docs/components/storybook-static/* combined-dist/components/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
